name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install DVC
      run: |
        pip install dvc

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install tox

    - name: Run tests with tox
      run: |
        tox

    # STEP REMOVED: dvc pull (Since data is now in Git, this is not needed)

    - name: Run DVC pipeline
      run: |
        # -f: Force reproduction even if DVC thinks it's up to date
        # --no-run-cache: Don't look for a remote run cache
        dvc repro -f --no-run-cache

    - name: Check DVC status
      run: |
        dvc status

    # Recommended: Upload the generated results so you can see them in GitHub
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: water-potability-results
        path: |
          reports/
          models/
